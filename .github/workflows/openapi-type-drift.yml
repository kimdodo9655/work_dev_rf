name: OpenAPI Type Drift Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-openapi-drift:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check OpenAPI-Type drift
        run: npm run check:openapi-drift

      - name: Check service type usage
        run: npm run check:service-types
