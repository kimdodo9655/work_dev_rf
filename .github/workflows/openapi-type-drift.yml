name: OpenAPI Type Drift

on:
  push:
    branches:
      - main
      - develop
      - 'codex/**'
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check OpenAPI type drift
        run: npm run check:openapi-type-drift

      - name: Run tests
        run: npm run test:unit
